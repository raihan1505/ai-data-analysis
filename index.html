<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AI Data Analysis Automation</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">DA</div>
      <span class="logo-text">DataAI</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-page="upload">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Upload Data</span>
      </a>
      <a href="#" class="nav-item" data-page="clean">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Clean & Preprocess</span>
      </a>
      <a href="#" class="nav-item" data-page="eda">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <span>Explore (EDA)</span>
      </a>
      <a href="#" class="nav-item" data-page="analysis">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <span>AI Analysis</span>
      </a>
      <a href="#" class="nav-item" data-page="visualize">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Visualize</span>
      </a>
      <a href="#" class="nav-item" data-page="report">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>Report & Export</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="api-status" id="apiStatus">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">Groq API not set</span>
      </div>
      <button class="btn-settings" onclick="openSettings()">⚙ Settings</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <button class="burger" onclick="toggleSidebar()">☰</button>
      <div class="breadcrumb" id="breadcrumb">Upload Data</div>
      <div class="top-actions">
        <span class="data-badge" id="dataStatus">No data loaded</span>
      </div>
    </header>
    <div class="page-content" id="pageContent"></div>
  </main>

  <div class="modal-overlay" id="settingsModal" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button onclick="closeSettings()" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div style="display:flex;align-items:center;gap:10px;padding:0.75rem;background:rgba(52,211,153,0.07);border:1px solid rgba(52,211,153,0.2);border-radius:8px;margin-bottom:1.25rem">
          <span style="font-size:18px">✅</span>
          <div style="font-size:13px;color:var(--text2)">AI sudah aktif — tidak perlu API key. Dikelola oleh server.</div>
        </div>
        <label class="field-label">AI Model</label>
        <select id="modelSelect" class="field-input">
          <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Best quality)</option>
          <option value="llama3-8b-8192">Llama 3 8B (Fastest)</option>
          <option value="mixtral-8x7b-32768">Mixtral 8x7B (Balanced)</option>
          <option value="gemma2-9b-it">Gemma 2 9B (Lightweight)</option>
        </select>
        <div style="margin-top:1.5rem;display:flex;gap:10px">
          <button class="btn-primary" onclick="saveSettings()">Save</button>
          <button class="btn-ghost" onclick="closeSettings()">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/analysis.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/report.js"></script>
</body>
</html>
